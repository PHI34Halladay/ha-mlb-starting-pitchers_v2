name: MLB Pitcher Check

on:
  schedule:
    # 14:00 Uhr Mitteleuropäische Sommerzeit (MESZ) ist 12:00 Uhr UTC
    - cron: '26 11 * * *'
  workflow_dispatch: # Erlaubt es dir, den Check jederzeit manuell in GitHub zu starten

jobs:
  check-pitchers:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # DIESER SCHRITT MUSS VORHANDEN SEIN:
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Erst danach wird das Skript gestartet:
    - name: Run check_pitchers.py
      env:
        HA_WEBHOOK_URL: ${{ secrets.HA_WEBHOOK_URL }}
      run: python check_pitchers.py
